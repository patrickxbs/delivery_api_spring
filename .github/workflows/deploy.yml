name: deploy na aws

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/delivery-api:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/delivery-api:latest

      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}

          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/delivery-api:latest
          
            docker stop delivery-api || true
            docker rm delivery-api || true
          
            docker run -d \
              -p 8080:8080 \
              --name delivery-api \
              --env-file /home/ec2-user/.delivery-env \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/delivery-api:latest
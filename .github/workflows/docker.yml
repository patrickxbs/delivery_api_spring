name: Docker Build

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/delivery-api:latest .

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/delivery-api:latest